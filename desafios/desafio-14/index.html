<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela completa</title>
    <style>
        body{
            font-family: arial, 'Times New Roman', Times, serif;
        }
        table{
            border-collapse: collapse;
            width: 600px;
        }
        th{
            background-color: gray;
            color: white;
        }
        th,td{
            border: 1px solid black;
            padding: 10px;
        }

        td.num{
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Tabela</h1>
    <table>
        <thead>
            <tr>
                <th rowspan="2" scope="col">Área</th>
                <th rowspan="2" scope="col">Disciplinas</th>
                <th colspan="2" scope="colgroup">Notas</th>
                <th rowspan="2" scope="col">Média</th>
            </tr>
            <tr>
                <th scope="col">Nota 1</th>
                <th scope="col">Nota 2</th>
            </tr>

        </thead>
        <tbody>
            <tr>
                <th rowspan="4" scope="rowgroup">Exatas</th>
                <td>Matematica</td>
                <td class="num">0,0</td>
                <td class="num">0,0</td>
                <td class="num">0,0</td>
            </tr>
            <tr>
                <td>Física</td>
                <td class="num">0,0</td>
                <td class="num">0,0</td>
                <td class="num">0,0</td>
            </tr>
            <tr>
                <td>Quimica</td>
                <td class="num">0,0</td>
                <td class="num">0,0</td>
                <td class="num">0,0</td>
                
            </tr>
            <tr>
                <td>Biologia</td>
                <td class="num">0,0</td>
                <td class="num">0,0</td>
                <td class="num">0,0</td>
                
            </tr>
        </tbody>



        <thead>
                <th colspan="4" scope="row">Media de Exatas</th>
                <td class="num">0,0</td>

                
        </thead>

         <tbody>
                <tr>
                    <th rowspan="2" scope="rowgroup">Humanas</th>
                    <td>Historia</td>
                    <td class="num">0,0</td>
                    <td class="num">0,0</td>
                    <td class="num">0,0</td>
                </tr>
                <tr>
                    <td>Geografia</td>
                    <td class="num">0,0</td>
                    <td class="num">0,0</td>
                    <td class="num">0,0</td>
                </tr>
            </tbody>

            <thead>
                <th colspan="4" scope="row">Media de Humanas</th>
                <td class="num">0,0</td>
            </thead>

            
    </table>
</body>
</html>
