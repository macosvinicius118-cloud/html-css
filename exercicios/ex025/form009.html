<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="cadastro.php" method="post">
      <p>
        <label for="inivel">Nivel:</label>
        <input type="range" name="nivel" id="inivel" value="5" required min="0" max="10"
        oninput="inum.innerHTML = Number(inivel.value)">

        <label for="inum"></label>
        <output id="inum">5</output>
      </p>


      <p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
      </p>

      
        
      

    </form>

</body>
</html>
