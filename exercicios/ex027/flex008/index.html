<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox</title>
    <style>
        div.container{
            display: flex;
            flex-flow: row wrap;
            align-items: flex-start;
            background-color: lightcoral;
            height: 200px;
        }

        div.item{
            background-color: lightblue;
            border: 1px solid black;
            padding: 20px;

        }

        div#i1{
            align-self: flex-start;
            order: 2;
        }
        div#i2{
            align-self: auto;
            order: 3;
        }
        div#i3{
           align-self: flex-end;
           order: 1;
        }
        div#i4{
            align-self: center;
            order: 7;
        }
        div#i5{
            align-self: stretch;
            order: -1;
        }
        div#i6{
            align-self: auto;
            order: 4;
        }
        div#i7{
            align-self: auto;
            order: -2;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="i1">A</div> 
        <div class="item" id="i2">B</div>
        <div class="item" id="i3">C</div>
        <div class="item" id="i4">D</div>
        <div class="item" id="i5">E</div>
        <div class="item" id="i6" >F</div>
        <div class="item" id="i7">G</div>

    </div>
</body>
</html>
