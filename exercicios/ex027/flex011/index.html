<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox</title>
    <style>
        div.container{
            display: flex;
            flex-flow: row nowrap;
            align-items: flex-start;
            background-color: lightcoral;
            height: 200px;
        }

        div.item{
            background-color: lightblue;
            border: 1px solid black;
            padding: 10px;
            flex-basis: 200px;
            
        }

        div#i1{
            flex-shrink: 1;
            flex-grow: 1;
            align-self: auto;

        }

        div#i2{
            flex-shrink: 2;
            flex-grow: 2;
            align-self: center;
        }

        div#i3{
            flex-shrink: 1;
            flex-grow: 3;
            align-self: flex-end;
        }


       
    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="i1">A</div> 
        <div class="item" id="i2">B</div>
        <div class="item" id="i3">C</div>
        

    </div>
</body>
</html>
