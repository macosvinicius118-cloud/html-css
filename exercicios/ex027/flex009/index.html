<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox</title>
    <style>
        div.container{
            display: flex;
            flex-flow: row wrap;
            background-color: lightcoral;
           
        }

        div.item{
            background-color: lightblue;
            border: 1px solid black;
            flex-basis: 200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">A conteudo diferente</div> 
        <div class="item">B </div>
        <div class="item">C conteudo um pouco maior comparado ao outro</div>
        <div class="item">D conteudo maior ainda comparado aos anterior mas tnem tanto assim </div>
        <div class="item">E</div>
        <div class="item">F</div>
        <div class="item">G</div>

    </div>
</body>
</html>
