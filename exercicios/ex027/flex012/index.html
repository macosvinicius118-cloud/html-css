<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox</title>
    <style>
        div.container{
            display: flex;
            flex-flow: row nowrap;
            background-color: lightcoral;
            height: 200px;
        }

        div.item{
            background-color: lightblue;
            border: 1px solid black;
            padding: 10px;    
        }



        div#i1{

           /* flex-shrink: 1;
            flex-basis: 200px; */
            
            flex: 3 0 100px;
           
            
        }

        div#i2{

           /* flex-shrink: 1;
            flex-grow: 0;
            flex-basis: 200px; */

            flex: initial;
        }

        div#i3{

            /*flex-shrink: 1;
            flex-grow: 0;
            flex-basis: 200px; */

            /*mesma coisa que flex: 3 1 auto; */

            flex: 1;
            
 
        }

        div#i4{
            /*flex-shrink: 1;
            flex-grow: 0;
            flex-basis: 200px; */

            flex: auto;
        }

        div#i5{

            flex: 2 0 200px;
            
        }

        div#i6{
            flex: none;
        }



      

       
    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="i1">A</div> 
        <div class="item" id="i2">B</div>
        <div class="item" id="i3">C</div>
        <div class="item" id="i4">D</div>
        <div class="item" id="i5">E</div>
        <div class="item" id="i6">F</div>
    </div>
</body>
</html>
