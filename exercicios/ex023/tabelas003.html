<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;

        }

        table{
            border-collapse: collapse;
            width: 200px;

        }
        td{
            border: 1px solid black;
            padding: 10px;
        }

      
    </style>
</head>
<body>
    <h1>Mesclagem de Células</h1>

    <table>
        
        <tbody>
            <tr>
                <td colspan="2">A</td>
                
                <td rowspan="3">C</td>
            </tr>
            <tr>
                
                <td colspan="2">E</td>
                
            </tr>
            <tr>
                <td colspan="2">G</td>
                
                
            </tr>
            <tr>
                <td>J</td>
                <td >K</td>
                <td>L</td>
            </tr>
            
        </tbody>
    </table>

   

  

</body>
</html>
