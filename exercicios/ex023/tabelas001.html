<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        table{
            border-collapse: collapse;
            
        }
        
        td{
            width: 200px;
            height: 200px;
            border: 1px solid black;
        }

        .numero1{
            
            vertical-align: top;
        }

        .numero2{
            vertical-align: bottom;
            
        }

        .numero3{
            text-align: center;
            vertical-align: middle;
        }

        .numero4{
            text-align: right;
            
        }
       




        td:hover{
            background-color: gray;
            color: red;
        }

       

        
    </style>
</head>
<body>
     
    <!--
    HIERARQUIA DE TABELA (SIMPLES)
    TABLE=tabela
          TABLE ROW= linha de tabela
                TABLE HEADER= cabeçalho de tabela
                TABLE DATA= dado de tabela

-->
    


    <h1>Minha priemira tabela</h1>

    <table>
        <tr>
            <td class="numero1">A1</td>
            <td class="numero2">B1</td>
            <td class="numero3">C1</td>
            <td class="numero4">D1</td>
        </tr>

        <tr>
            <td class="numero1">A2</td>
            <td class="numero2">B2</td>
            <td class="numero3">C2</td>
            <td class="numero4">D2</td>
        </tr>

        <tr>
            <td class="numero1">A3</td>
            <td class="numero2">B3</td>
            <td class="numero3">C3</td>
            <td class="numero4">D3</td>
        </tr>

        <tr>
            <td class="numero1">A4</td>
            <td class="numero2">B4</td>
            <td class="numero3">C4</td>
            <td class="numero4">D4c</td>
        </tr>
    </table>

   
    
</body>
</html>
